# Blocket Scraper Configuration - Motorcycles Specialized

target:
  base_url: "https://www.blocket.se"
  categories:
    # --- Price-Bracket Sharded MC (Parent Category Only) ---
    # Captures 100% of ads (including blank types) while staying safely below the 2,000-listing ceiling per shard
    - name: "MC Budget Entry"
      path: "/mobility/search/mc?price=0-15000"
    - name: "MC Commuter A"
      path: "/mobility/search/mc?price=15001-30000"
    - name: "MC Commuter B"
      path: "/mobility/search/mc?price=30001-45000"
    - name: "MC Midrange A"
      path: "/mobility/search/mc?price=45001-60000"
    - name: "MC Midrange B"
      path: "/mobility/search/mc?price=60001-75000"
    - name: "MC Premium Sport"
      path: "/mobility/search/mc?price=75001-90000"
    - name: "MC Premium Tourer"
      path: "/mobility/search/mc?price=90001-110000"
    - name: "MC Luxury A"
      path: "/mobility/search/mc?price=110001-140000"
    - name: "MC Luxury B"
      path: "/mobility/search/mc?price=140001-180000"
    - name: "MC Super-Luxury"
      path: "/mobility/search/mc?price=180001-250000"
    - name: "MC Collector Tiers"
      path: "/mobility/search/mc?price=250001-999999"

scraper_settings:
  headless: true
  timeout_ms: 30000
  delay_seconds: 3.0        # Politeness delay to prevent blocks
#  max_pages: 5
  user_agent_rotation: true

database:
  type: "duckdb"            # sqlite or duckdb
  filename: "data/scraped_listings.duckdb"
