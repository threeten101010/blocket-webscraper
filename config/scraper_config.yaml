# Blocket Scraper Configuration - Motorcycles Specialized

target:
  base_url: "https://www.blocket.se"
  categories:
    # --- Sub-sharded Touring (type=12) ---
    - name: "Touring Budget"
      path: "/mobility/search/mc?type=12&price=0-50000"
    - name: "Touring Midrange"
      path: "/mobility/search/mc?type=12&price=50001-100000"
    - name: "Touring Premium"
      path: "/mobility/search/mc?type=12&price=100001-999999"
      
    # --- Sub-sharded Custom (type=4) ---
    - name: "Custom Budget"
      path: "/mobility/search/mc?type=4&price=0-70000"
    - name: "Custom Premium"
      path: "/mobility/search/mc?type=4&price=70001-999999"

    # --- Standard Type Shards ---
    - name: "Cross-Enduro-Trial"
      path: "/mobility/search/mc?type=3"
    - name: "Sport"
      path: "/mobility/search/mc?type=11"
    - name: "MC-Scooter"
      path: "/mobility/search/mc?type=18"
    - name: "Klassisk-Naken"
      path: "/mobility/search/mc?type=2"
    - name: "Offroad-Motard"
      path: "/mobility/search/mc?type=7"
    - name: "Adventure"
      path: "/mobility/search/mc?type=20"
    - name: "Cruiser"
      path: "/mobility/search/mc?type=16"
    - name: "Lätt-MC"
      path: "/mobility/search/mc?type=5"
    - name: "Veteran"
      path: "/mobility/search/mc?type=14"
    - name: "Supermoto"
      path: "/mobility/search/mc?type=1547"
    - name: "Trehjulig"
      path: "/mobility/search/mc?type=1549"
    - name: "Chopper"
      path: "/mobility/search/mc?type=17"
    - name: "Trike"
      path: "/mobility/search/mc?type=13"
    - name: "Sidovagn"
      path: "/mobility/search/mc?type=9"
    - name: "Annat"
      path: "/mobility/search/mc?type=15"

scraper_settings:
  headless: true
  timeout_ms: 30000
  delay_seconds: 3.0        # Politeness delay to prevent blocks
#  max_pages: 5
  user_agent_rotation: true

database:
  type: "duckdb"            # sqlite or duckdb
  filename: "data/scraped_listings.duckdb"
