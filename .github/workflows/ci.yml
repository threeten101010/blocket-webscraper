name: 🕷️ Blocket Scraper CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate-scraper:
    name: 🐍 Validate Python Scraper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bs4

      - name: Run parser unit tests
        run: python -m pytest tests/test_parser.py

      - name: Compile core files
        run: python -m py_compile main.py src/scraper.py src/parser.py src/storage.py src/clustering.py
